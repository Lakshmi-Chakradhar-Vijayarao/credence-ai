version: "3.9"

services:
  credence:
    build: .
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CREDENCE_DB_PATH: /data/epistemic_registry.db
      CREDENCE_SESSION_DIR: /data/sessions
      CREDENCE_AUTO_PERSIST: "1"
      CREDENCE_USE_SCOUT: "0"
      CREDENCE_USE_BEHAVIORAL: "0"
      CREDENCE_GHOST_PRECISE: "0"
      # Optional: override models
      # CREDENCE_MAIN_MODEL: claude-opus-4-7
      # CREDENCE_COMPRESSION_MODEL: claude-haiku-4-5-20251001
    volumes:
      - credence_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import credence; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Prometheus metrics exporter
  # Uncomment to enable observability
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml
  #   depends_on:
  #     - credence

  # Optional: Grafana dashboard
  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: credence
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #     - ./ops/grafana/dashboards:/var/lib/grafana/dashboards
  #   depends_on:
  #     - prometheus

volumes:
  credence_data:
  # grafana_data:
