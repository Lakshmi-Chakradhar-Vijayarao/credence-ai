name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # trigger: git tag v1.0.0 && git push origin v1.0.0

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-install:
    name: Smoke test built wheel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install from wheel
        run: pip install dist/*.whl "fastmcp>=1.0.0"

      - name: Verify entry points
        run: |
          credence demo
          python -c "import credence; print('v' + credence.__version__)"

  publish:
    name: Publish to PyPI
    needs: [build, test-install]
    runs-on: ubuntu-latest
    environment: pypi          # maps to the "pypi" Environment in repo settings
    permissions:
      id-token: write          # required for PyPI trusted publishing (OIDC — no token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
