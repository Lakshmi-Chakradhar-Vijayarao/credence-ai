name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,mcp]"

      - name: Run test suite (no API key required)
        run: pytest tests/ -v --tb=short

      - name: Smoke test CLI entry point
        run: credence demo

  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,mcp]"

      - name: Check all core exports
        run: |
          python -c "
          import credence
          from credence import (
              CredenceRegistry,
              CredenceMemory,
              wrap, WrapResult, measure_fcr,
          )
          print('All exports OK — v' + credence.__version__)
          "

      - name: MCP server imports cleanly
        run: python -c "from credence.mcp_server import main; print('MCP server OK')"

  rust-gate:
    name: Rust Gate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build credence-gate
        working-directory: credence_gate
        run: cargo build --release

      - name: Verify binary exists
        run: ls -lh credence_gate/target/release/credence-gate
