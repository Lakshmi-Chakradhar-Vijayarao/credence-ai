<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CREDENCE — Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    background: #05050a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .canvas {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    transform-origin: center center;
    flex-shrink: 0;
  }

  /* ── dot grid ── */
  .grid {
    position: absolute;
    inset: 0;
    border-radius: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* ── ambient glows ── */
  .glow-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1100px; height: 600px;
    background: radial-gradient(ellipse, rgba(48,209,88,.09) 0%, transparent 65%);
  }
  .glow-left {
    position: absolute;
    top: 30%; left: -5%;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(191,90,242,.06) 0%, transparent 65%);
  }
  .glow-right {
    position: absolute;
    top: 40%; right: -5%;
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(90,200,250,.05) 0%, transparent 65%);
  }

  /* ── content ── */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .32em;
    text-transform: uppercase;
    color: rgba(48,209,88,.6);
    margin-bottom: 36px;
  }

  .wordmark {
    font-size: 172px;
    font-weight: 800;
    letter-spacing: .22em;
    text-indent: .22em; /* optical — compensates for letter-spacing on last char */
    color: #F5F5F7;
    line-height: 1;
    text-shadow:
      0 0  60px rgba(48,209,88,.18),
      0 0 140px rgba(48,209,88,.09),
      0 0 280px rgba(48,209,88,.05);
  }

  /* ── thin rule ── */
  .rule-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 44px 0 36px;
    width: 720px;
  }
  .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(48,209,88,.5), transparent);
  }
  .rule-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(48,209,88,.7);
    box-shadow: 0 0 10px rgba(48,209,88,.8);
  }

  .tagline {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: .08em;
    color: rgba(245,245,247,.38);
    text-align: center;
    line-height: 1.6;
  }
  .tagline strong {
    font-weight: 500;
    color: rgba(245,245,247,.72);
  }

  /* ── bottom attribution ── */
  .attribution {
    position: absolute;
    bottom: 52px;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(245,245,247,.18);
  }
  .attribution span {
    color: rgba(245,245,247,.32);
  }
  .attr-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(245,245,247,.2);
  }
</style>
</head>
<body>
<div class="canvas" id="canvas">

  <div class="grid"></div>
  <div class="glow-center"></div>
  <div class="glow-left"></div>
  <div class="glow-right"></div>

  <div class="stage">
    <div class="eyebrow">Built with Claude Code &nbsp;·&nbsp; For Claude Code</div>
    <div class="wordmark">CREDENCE</div>
    <div class="rule-wrap">
      <div class="rule"></div>
      <div class="rule-dot"></div>
      <div class="rule"></div>
    </div>
    <div class="tagline">
      Preserve the doubt.&nbsp;&nbsp;<strong>Ship the truth.</strong>
    </div>
  </div>

  <div class="attribution">
    <span>Epistemic enforcement for Claude Code</span>
    <div class="attr-dot"></div>
    <span>Chakradhar Vijayarao</span>
    <div class="attr-dot"></div>
    <span>credence-ai</span>
  </div>

</div><!-- /canvas -->

<script>
  function fit() {
    const el = document.getElementById('canvas');
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    el.style.transform = `scale(${scale})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
